name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # the semgrep-action wrapper is deprecated, so we will run natively :/
      - name: Install Semgrep
        run: pipx install semgrep

      # semgrep exits 0 on findings (SARIF still uploads), non-zero only on a
      # scan error. secrets/ excluded: its ciphertext trips p/secrets.
      - name: Run Semgrep
        run: >-
          semgrep scan
          --config p/kotlin
          --config p/secrets
          --config p/owasp-top-ten
          --exclude secrets
          --sarif --output semgrep.sarif

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      # exit 0 for same reason as semgrep
      - name: Run Detekt
        run: ./gradlew :app:detekt

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always() && hashFiles('app/build/reports/detekt/detekt.sarif') != ''
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif

  # Fails the build if any secrets file no longer decrypts with the CI key.
  sops-decrypt-check:
    name: SOPS decrypt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Shell tracing could echo decrypted secrets before masking; forbid it.
      # (Patterns use character classes so they don't match their own source.)
      - name: Forbid shell tracing where secrets flow
        run: |
          if grep -rnE 'set[[:space:]]+-[a-z]*x|set[[:space:]]+-o[[:space:]]+xtrace|\b(bash|sh)[[:space:]]+-[a-z]*x' \
              .github/workflows scripts; then
            echo "::error::Shell tracing found in CI code (see matches above). It can leak decrypted secrets into job logs; remove it."
            exit 1
          fi
          echo "No shell tracing in workflows or scripts."

      - name: Install sops
        run: bash scripts/ci/install-sops.sh

      - name: Verify every secrets file decrypts with the CI key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "::notice::SOPS_AGE_KEY not available (fork PR?); skipping decrypt check."
            exit 0
          fi
          status=0
          for f in secrets/*.yaml; do
            if sops decrypt "$f" > /dev/null 2>&1; then
              echo "OK: $f decrypts."
            else
              echo "::error::Cannot decrypt $f with the CI age key. Re-encrypt it to the recipient in .sops.yaml."
              status=1
            fi
          done
          exit "$status"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

  python-tests:
    name: Python script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run database generator tests
        run: python -m unittest discover -s .github/scripts -p 'test_*.py' -v
