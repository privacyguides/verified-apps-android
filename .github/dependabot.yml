version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns:
          - "androidx.*"
          - "com.google.accompanist*"
      compose-bom:
        patterns:
          - "androidx.compose:compose-bom"
    ignore:
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "privacyguides/.github/.github/workflows/sign-artifact.yml"
